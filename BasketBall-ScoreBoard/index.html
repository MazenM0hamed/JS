<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    
    </head>
    <body>
        <div class="container">
            <div class="home">
                <h3>HOME</h3>
                <div class="scoreboard" id="home-board-el">
                    0
                </div>
                <div class="addbuttons">
                    <button class="btn" onclick="homeScoreIncrement()">+1</button>
                    <button class="btn" onclick="homePlusTwoScoreIncrement()">+2</button>
                    <button class="btn" onclick="homePlusThreeScoreIncrement()">+3</button> 
                </div>         
            </div>
            <div class="guest">
                <h3>GUEST</h3>
                <div class="scoreboard" id="guest-board-el">
                 0
                </div>
                <div class="addbuttons">
                    <button class="btn" onclick="guestScoreIncrement()">+1</button>
                    <button class="btn" onclick="guestPlusTwoScoreIncrement()">+2</button>
                    <button class="btn" onclick="guestPlusThreeScoreIncrement()">+3</button> 
                </div>      
            </div>
            <div class="newgamebtn">
                <button id="add-btn-el" onclick="newGame()" >New Game </button>
            </div> 
        </div>
         
        <script src="index.js"></script>
    </body>
</html>
